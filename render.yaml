# Render blueprint - deploy backend with one click
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: anomalias-aelc-backend
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGO_URL
        sync: false   # Define manually with MongoDB Atlas URI
      - key: DB_NAME
        value: aelc_anomalias
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false   # liceuanomalias@gmail.com
      - key: SMTP_PASSWORD
        sync: false   # Gmail App Password
      - key: EMAIL_SENDER_NAME
        value: Escola Secundária de Latino Coelho
      - key: DEFAULT_RECIPIENT
        value: nuno.ribeiro@aelc-lamego.pt
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_HOURS
        value: 168
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false   # Define a strong password
      - key: ALLOWED_DOMAIN
        value: aelc-lamego.pt
